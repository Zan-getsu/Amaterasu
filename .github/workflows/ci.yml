name: CI

"on":
  push:
  pull_request:

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  AMATERASU_SERVICE_PWD_SALT: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
  AMATERASU_PIN_SALT: "ffeeddccbbaa99887766554433221100ffeeddccbbaa99887766554433221100"
  AMATERASU_DB_PARTITION_SALT: "wzmlx_v3_db_partition_salt"

jobs:
  smoke:
    name: Smoke Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Compile Python sources
        run: python -m compileall bot web tests config_sample.py cron_boot.py update.py

      - name: Run lightweight smoke tests
        run: python -m pytest tests/test_config.py tests/test_security.py -v

      - name: Report ruff findings
        continue-on-error: true
        run: |
          python -m pip install ruff
          ruff check . --output-format=github
          ruff format --check .

      - name: Report dependency audit
        continue-on-error: true
        run: |
          python -m pip install pip-audit
          pip-audit -r requirements.txt
