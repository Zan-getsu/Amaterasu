# Reliable smoke CI for Amaterasu.
#
# The full bot runtime has large optional downloader/service dependencies.
# This workflow avoids installing that whole stack on every push and instead
# runs deterministic checks that catch broken Python syntax plus lightweight
# config/security regressions.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  AMATERASU_SERVICE_PWD_SALT: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
  AMATERASU_PIN_SALT: "ffeeddccbbaa99887766554433221100ffeeddccbbaa99887766554433221100"
  AMATERASU_DB_PARTITION_SALT: "wzmlx_v3_db_partition_salt"

jobs:
  checks:
    name: Python Smoke Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install CI tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ruff

      - name: Compile Python sources
        run: python -m compileall bot web tests config_sample.py cron_boot.py update.py

      - name: Run lightweight smoke tests
        run: python -m pytest tests/test_config.py tests/test_security.py -v

      - name: Report ruff findings
        run: |
          ruff check . --output-format=github || true
          ruff format --check . || true

      - name: Report dependency audit
        run: |
          python -m pip install pip-audit || exit 0
          pip-audit -r requirements.txt || true
