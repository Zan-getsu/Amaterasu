name: Publish Amaterasu App Image

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Publish Amaterasu Docker Image
    types:
      - completed
  push:
    branches:
      - main
      - master
    paths-ignore:
      - Dockerfile.base
      - Dockerfile.source-build
      - .github/workflows/dockerhub-amaterasu.yml
      - "*.md"
      - LICENSE

permissions:
  contents: read

concurrency:
  group: dockerhub-app
  cancel-in-progress: true

env:
  IMAGE_NAME: amaterasu
  BASE_TAG: v1

jobs:
  publish:
    name: Build and push app image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets before publishing."
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Wait for base image
        env:
          BASE_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.BASE_TAG }}
        run: |
          for attempt in $(seq 1 30); do
            if docker buildx imagetools inspect "$BASE_IMAGE" >/dev/null 2>&1; then
              echo "Base image is available: $BASE_IMAGE"
              exit 0
            fi
            echo "Base image not available yet ($attempt/30): $BASE_IMAGE"
            sleep 60
          done
          echo "::error::Base image was not available after 30 minutes: $BASE_IMAGE"
          exit 1

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.BASE_TAG }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
