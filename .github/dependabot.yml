# Phase 6.6 — Dependabot configuration for automated dependency updates.
# Monthly cadence. Groups minor+patch updates into a single PR; major
# updates get separate PRs for careful review.
version: 2
updates:
  # Python dependencies (pip)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    # Group minor and patch updates into one PR
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Major updates get separate PRs
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
