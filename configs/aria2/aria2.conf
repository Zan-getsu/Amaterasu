enable-rpc=true
rpc-listen-all=true
rpc-listen-port=6800
rpc-max-request-size=1024M
max-concurrent-downloads=1000
max-connection-per-server=16
split=16
min-split-size=32M
optimize-concurrent-downloads=true
continue=true
auto-file-renaming=true
force-save=true
content-disposition-default-utf8=true
user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36
http-accept-gzip=true
# Retry transient failures up to 20 times (aria2 default is 5). Covers
# connection drops, 5xx server errors, and DNS hiccups. Each retry waits
# `retry-wait` seconds before re-attempting.
max-tries=20
# Wait 5 seconds between retries. Long enough to let a flaky server
# recover, short enough that the bot doesn't hang for minutes on a
# single failed download. Combined with max-tries=20, the worst-case
# retry budget is ~100 seconds before aria2 gives up.
retry-wait=5
# Connect timeout: 30 seconds. If the server doesn't accept the TCP
# connection within 30s, abort and retry (subject to max-tries). Prevents
# the bot from hanging indefinitely on unreachable hosts.
connect-timeout=30
# Abort downloads that stall below 1 KB/s. If the average speed drops
# below this threshold, aria2 kills the connection and retries (subject
# to max-tries). Prevents "zombie" downloads that hang at 0.1 KB/s for
# hours. 1K is conservative — raise to 10K if you have fast internet
# and want to fail-fast on slow mirrors.
lowest-speed-limit=1K
# TLS certificate verification is DISABLED by design. A mirror-leech bot
# must download from arbitrary sources including FTP servers, self-signed
# HTTPS hosts, certificate-pinned CDNs, corporate proxies, and hosts
# with broken/expired certs. Enabling check-certificate=true would break
# downloads from these sources — the bot would be useless for its
# primary purpose. The "security risk" of MITM is acceptable for a
# self-hosted bot whose operator controls the network path. If you need
# strict TLS for a specific deployment, override this in your config.py
# by setting Config.BIND_ADDRESS or by editing this file after deploy.
check-certificate=false
bt-enable-lpd=true
bt-detach-seed-only=true
bt-remove-unselected-file=true
bt-max-peers=0
bt-max-open-files=1000
bt-request-peer-speed-limit=1M
seed-ratio=0
peer-id-prefix=-qB5210-
peer-agent=qBittorrent/5.2.1
follow-torrent=mem
enable-dht=true
enable-peer-exchange=true
listen-port=6881-6999
dht-listen-port=6881-6999
file-allocation=falloc
disk-cache=64M
check-integrity=true
max-upload-limit=1K
quiet=true
summary-interval=0
